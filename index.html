<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carlitos Campos · Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white:    #FFFFFF;
      --off:      #F5F6F8;
      --ink:      #111318;
      --mid:      #5A6070;
      --accent:   #2152C8;
      --accent2:  #3B6BEA;
      --border:   #E2E5EC;
      --radius:   14px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--off);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1.25rem 4rem;
    }

    /* ── CARD ── */
    .card {
      background: var(--white);
      border-radius: 24px;
      max-width: 440px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(17,19,24,.08), 0 1px 4px rgba(17,19,24,.04);
      overflow: hidden;
      animation: rise .55s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── HERO ── */
    .hero {
      position: relative;
      background: linear-gradient(160deg, #1A2A52 0%, #2152C8 100%);
      padding: 2.5rem 2rem 5rem;
      text-align: center;
    }

    /* timeline reel strip — signature element */
    .reel {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 28px;
      background: var(--ink);
      display: flex;
      align-items: center;
      overflow: hidden;
    }
    .reel::before, .reel::after {
      content: '';
      display: block;
      flex-shrink: 0;
      width: 100%;
      height: 10px;
      background-image: repeating-linear-gradient(
        90deg,
        transparent 0px, transparent 10px,
        var(--white) 10px, var(--white) 14px,
        transparent 14px, transparent 24px
      );
      opacity: .18;
    }
    .reel-holes {
      position: absolute;
      top: 0; bottom: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 0 12px;
      pointer-events: none;
    }
    .reel-hole {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #2A2F3E;
      border: 2px solid #3a3f50;
      flex-shrink: 0;
    }

    .photo-wrap {
      display: inline-block;
      border-radius: 50%;
      padding: 3px;
      background: linear-gradient(135deg, rgba(255,255,255,.35), rgba(255,255,255,.1));
      box-shadow: 0 8px 32px rgba(0,0,0,.35);
      margin-bottom: 1rem;
    }
    .photo-wrap img {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
    }

    .hero-name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.65rem;
      color: #fff;
      letter-spacing: -.02em;
      line-height: 1.1;
    }

    .hero-title {
      margin-top: .35rem;
      font-size: .82rem;
      font-weight: 500;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: rgba(255,255,255,.65);
    }

    /* ── BODY ── */
    .body {
      padding: 2rem 1.75rem 1.5rem;
    }

    /* ── SERVICES ── */
    .section-label {
      font-family: 'Syne', sans-serif;
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: .85rem;
    }

    .services {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .55rem;
      margin-bottom: 2rem;
    }

    .service-chip {
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: .6rem .8rem;
      display: flex;
      align-items: center;
      gap: .5rem;
      transition: border-color .2s, background .2s;
    }

    .service-chip:hover {
      border-color: var(--accent2);
      background: #EEF3FF;
    }

    .service-icon {
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    .service-text {
      font-size: .8rem;
      font-weight: 500;
      line-height: 1.3;
      color: var(--ink);
    }

    /* ── DIVIDER ── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 1.5rem 0;
    }

    /* ── PORTFOLIO ── */
    .portfolio-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .9rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      text-decoration: none;
      transition: border-color .2s, background .2s;
      margin-bottom: 2rem;
    }

    .portfolio-link:hover {
      border-color: var(--accent2);
      background: #EEF3FF;
    }

    .portfolio-left { display: flex; align-items: center; gap: .7rem; }
    .portfolio-icon {
      width: 36px; height: 36px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      color: #fff;
      font-size: 1rem;
      flex-shrink: 0;
    }
    .portfolio-label {
      font-size: .78rem;
      color: var(--mid);
      font-weight: 400;
    }
    .portfolio-name {
      font-family: 'Syne', sans-serif;
      font-size: .92rem;
      font-weight: 700;
      color: var(--ink);
    }
    .arrow {
      color: var(--mid);
      font-size: 1rem;
    }

    /* ── CTA BUTTONS ── */
    .ctas {
      display: flex;
      flex-direction: column;
      gap: .7rem;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .55rem;
      padding: .85rem 1rem;
      border-radius: var(--radius);
      font-family: 'Inter', sans-serif;
      font-size: .88rem;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: opacity .18s, transform .18s;
    }

    .btn:active { transform: scale(.98); }

    .btn-whatsapp {
      background: #25D366;
      color: #fff;
    }

    .btn-whatsapp:hover { opacity: .9; }

    .btn-ig {
      background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
      color: #fff;
    }

    .btn-ig:hover { opacity: .9; }

    .btn-tiktok {
      background: var(--ink);
      color: #fff;
    }

    .btn-tiktok:hover { opacity: .85; }

    .btn-icon { width: 20px; height: 20px; flex-shrink: 0; }

    /* ── FOOTER ── */
    .footer {
      margin-top: 2rem;
      text-align: center;
      font-size: .72rem;
      color: #B0B6C3;
      letter-spacing: .04em;
    }
  </style>
</head>
